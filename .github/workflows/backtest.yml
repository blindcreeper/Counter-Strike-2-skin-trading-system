name: CS2 Backtest
on:
  schedule:
    - cron: '0 14 * * *'

  workflow_dispatch:
    inputs:
      hours_back:
        description: Hours back
        required: false
        default: '72'
      initial_balance:
        description: Initial balance
        required: false
        default: '10000'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run backtest
        run: python scripts/run_backtest.py

      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: backtest_logs/