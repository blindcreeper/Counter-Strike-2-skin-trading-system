name:  CS2 自动量化回测

on:
  # 每天22点执行（北京时间）
  schedule:
    - cron: "0 14 * * *"  # UTC 14:00 = 北京时间 22:00
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      hours_back:
        description: "回溯时间（小时）"
        required: false
        default: "72"
        type: choice
        options:
          - "24"
          - "72"
          - "168"
      initial_balance:
        description: "初始虚拟资金"
        required: false
        default: "10000"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    
    steps:
      # 1. 检出代码
      - name:  检出代码
        uses: actions/checkout@v4
      
      # 2. 设置Python环境
      - name:  配置Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      # 3. 安装依赖
      - name:  安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 运行回测
      - name:  执行回测
        id: backtest
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python scripts/run_backtest.py \
            --hours-back ${{ inputs.hours_back || "72" }} \
            --initial-balance ${{ inputs.initial_balance || "10000" }} \
            --enable-charts \
            --enable-dingtalk \
            --dingtalk-webhook "${{ secrets.DINGTALK_WEBHOOK }}"
      
      # 5. 上传回测报告（成功时）
      - name:  上传回测报告
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: |
            backtest_logs/
            backtest_charts/
          retention-days: 30
      
      # 6. 上传失败时发送钉钉通知
      - name: ❌ 发送失败通知
        if: failure()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python scripts/send_dingtalk_error.py \
            --webhook "${{ secrets.DINGTALK_WEBHOOK }}" \
            --error "${{ job.status }}"
  
  # 可选：定期监控工作流健康度
  notify-success:
    needs: backtest
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: ✅ 回测成功标记
        run: |
          echo "✅ 回测流程成功完成"
          echo "时间: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
