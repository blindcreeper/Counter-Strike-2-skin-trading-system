name: 馃捁 CS2 鑷姩閲忓寲鍥炴祴

on:
  # 姣忓ぉ22鐐规墽琛岋紙鍖椾含鏃堕棿锛?
  schedule:
    - cron: '0 14 * * *'  # UTC 14:00 = 鍖椾含鏃堕棿 22:00
  
  # 鍏佽鎵嬪姩瑙﹀彂
  workflow_dispatch:
    inputs:
      hours_back:
        description: '鍥炴函鏃堕棿锛堝皬鏃讹級'
        required: false
        default: '72'
        type: choice
        options:
          - '24'
          - '72'
          - '168'
      initial_balance:
        description: '鍒濆铏氭嫙璧勯噾'
        required: false
        default: '10000'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    
    steps:
      # 1. 妫€鍑轰唬鐮?
      - name: 馃摜 妫€鍑轰唬鐮?
        uses: actions/checkout@v4
      
      # 2. 璁剧疆Python鐜
      - name: 馃悕 閰嶇疆Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 瀹夎渚濊禆
      - name: 馃摝 瀹夎渚濊禆
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 杩愯鍥炴祴
      - name: 馃殌 鎵ц鍥炴祴
        id: backtest
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python scripts/run_backtest.py \
            --hours-back ${{ inputs.hours_back || '72' }} \
            --initial-balance ${{ inputs.initial_balance || '10000' }} \
            --enable-charts \
            --enable-dingtalk \
            --dingtalk-webhook "${{ secrets.DINGTALK_WEBHOOK }}"
      
      # 5. 涓婁紶鍥炴祴鎶ュ憡锛堟垚鍔熸椂锛?
      - name: 馃搳 涓婁紶鍥炴祴鎶ュ憡
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: |
            backtest_logs/
            backtest_charts/
          retention-days: 30
      
      # 6. 涓婁紶澶辫触鏃跺彂閫侀拤閽夐€氱煡
      - name: 鉂?鍙戦€佸け璐ラ€氱煡
        if: failure()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python scripts/send_dingtalk_error.py \
            --webhook "${{ secrets.DINGTALK_WEBHOOK }}" \
            --error "${{ job.status }}"
  
  # 鍙€夛細瀹氭湡鐩戞帶宸ヤ綔娴佸仴搴峰害
  notify-success:
    needs: backtest
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: 鉁?鍥炴祴鎴愬姛鏍囪
        run: |
          echo "鉁?鍥炴祴娴佺▼鎴愬姛瀹屾垚"
          echo "鏃堕棿: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
