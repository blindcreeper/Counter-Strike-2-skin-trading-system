name: CS2 每日回测

on:
  # 每天18点执行（北京时间 = UTC 10:00）
  schedule:
    - cron: "0 10 * * *"

  # 允许手动触发
  workflow_dispatch:
    inputs:
      holding_period_hours:
        description: "最小持有期（小时）"
        required: false
        default: "72"
        type: string

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      PYTHONUNBUFFERED: 1
      HOLDING_PERIOD_HOURS: ${{ inputs.holding_period_hours || '72' }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 配置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 执行回测
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          echo "=== 开始每日回测 ==="
          python scripts/run_backtest.py
      
      - name: 上传回测报告
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: |
            backtest_logs/
            backtest_charts/
          retention-days: 30
      
      - name: 发送成功通知
        if: success()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          echo "回测成功，发送钉钉通知..."
          python scripts/send_dingtalk_success.py \
            --webhook "${{ secrets.DINGTALK_WEBHOOK }}" \
            --summary "每日回测完成，报告已生成"
      
      - name: 发送失败通知
        if: failure()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          echo "回测失败，发送钉钉通知..."
          python scripts/send_dingtalk_error.py \
            --webhook "${{ secrets.DINGTALK_WEBHOOK }}" \
            --error "${{ job.status }}"
