name: CS2 自动量化回测

on:
  # 每天22点执行（北京时间）
  schedule:
    - cron: "0 14 * * *"  # UTC 14:00 = 北京时间 22:00

  # 允许手动触发
  workflow_dispatch:
    inputs:
      backtest_interval_minutes:
        description: "回测间隔（分钟）"
        required: false
        default: "360"
        type: choice
        options:
          - "60"
          - "180"
          - "360"
          - "720"
      run_duration_minutes:
        description: "本次工作流运行时长（分钟）"
        required: false
        default: "330"
        type: choice
        options:
          - "120"
          - "240"
          - "330"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决Node.js 20弃用警告
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v5
      
      # 2. 设置Python环境
      - name: 配置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 持续扫描 + 定时回测
      - name: 执行常驻流水线
        id: backtest
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python scripts/live_pipeline.py \
            --backtest-interval-minutes ${{ inputs.backtest_interval_minutes || 360 }} \
            --run-duration-minutes ${{ inputs.run_duration_minutes || 330 }} \
            --run-backtest-immediately
      
      # 5. 上传回测报告（成功时）
      - name: 上传回测报告
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: |
            backtest_logs/
            backtest_charts/
          retention-days: 30
      
      # 6. 上传失败时发送钉钉通知
      - name: ❌ 发送失败通知
        if: failure()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python scripts/send_dingtalk_error.py \
            --webhook "${{ secrets.DINGTALK_WEBHOOK }}" \
            --error "${{ job.status }}"
  
  # 可选：定期监控工作流健康度
  notify-success:
    needs: backtest
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: ✅ 回测成功标记
        run: |
          echo "✅ 回测流程成功完成"
          echo "时间: $(date -u +%Y-%m-%d %H:%M:%S UTC)"