version: '3.8'

services:
  backtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-backtest
    
    # 鐜鍙橀噺
    environment:
      # API 閰嶇疆
      SDT_KEY: ${SDT_KEY:-your_sdt_key}
      CSQAQ_TOKEN: ${CSQAQ_TOKEN:-your_csqaq_token}
      
      # 鍥炴祴閰嶇疆
      INITIAL_BALANCE: ${INITIAL_BALANCE:-10000}
      FEE_RATE: ${FEE_RATE:-0.025}
      MIN_PROFIT_RATE: ${MIN_PROFIT_RATE:-0.03}
      HOLDING_PERIOD_HOURS: ${HOLDING_PERIOD_HOURS:-72}
      
      # Python 缂栫爜
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
    
    # 鏁版嵁鍗锋寕杞?
    volumes:
      # 杈撳嚭缁撴灉鏄犲皠鍒颁富鏈?
      - ./output/backtest_results:/app/output/backtest_results
      - ./output/backtest_logs:/app/output/backtest_logs
      
      # 鏁版嵁鏂囦欢锛堝彲閫夛紝鑻ユ兂鍔ㄦ€佹洿鏂帮級
      - ./data:/app/data
    
    # 閲嶅惎绛栫暐
    restart: unless-stopped
    
    # 璧勬簮闄愬埗锛堝彲閫夛級
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # 鏃ュ織椹卞姩
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    
    # 缃戠粶閰嶇疆锛堝彲閫夛級
    networks:
      - backtest_network

  # 鍙€夛細瀹氭椂浠诲姟瀹瑰櫒锛堜娇鐢?APScheduler锛?
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-scheduler
    
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
      SDT_KEY: ${SDT_KEY:-your_sdt_key}
      CSQAQ_TOKEN: ${CSQAQ_TOKEN:-your_csqaq_token}
    
    volumes:
      - ./output/backtest_results:/app/output/backtest_results
      - ./output/backtest_logs:/app/output/backtest_logs
      - ./data:/app/data
    
    restart: unless-stopped
    
    entrypoint: python ./scripts/auto_backtest.py
    
    depends_on:
      - backtest
    
    networks:
      - backtest_network
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

networks:
  backtest_network:
    driver: bridge

