version: '3.8'

services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-scanner
    
    # 环境变量
    environment:
      # 状态服务端口
      STATUS_HOST: "0.0.0.0"
      STATUS_PORT: "8199"

      # Python 编码
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
    
    # 端口映射：状态监控 API
    ports:
      - "8199:8199"
    
    # 数据卷挂载
    volumes:
      # 共享数据目录（scanner 写入，scheduler 读取）
      - ./shared_data:/app/shared_data

      # 输出结果映射到主机
      - ./output/backtest_results:/app/output/backtest_results
      - ./output/backtest_logs:/app/output/backtest_logs

      # 数据文件（可选，若想动态更新）
      - ./data:/app/data

      # 心跳文件（宿主机可查看）
      - ./heartbeat.json:/app/heartbeat.json
    
    # 重启策略
    restart: unless-stopped
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8199/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 日志驱动
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    
    # 网络配置
    networks:
      - backtest_network

  # 可选：定时任务容器（使用APScheduler）
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-scheduler
    
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
    
    volumes:
      - ./shared_data:/app/shared_data
      - ./output/backtest_results:/app/output/backtest_results
      - ./output/backtest_logs:/app/output/backtest_logs
      - ./data:/app/data
    
    restart: unless-stopped
    
    entrypoint: python ./scripts/auto_backtest.py
    
    depends_on:
      - scanner
    
    networks:
      - backtest_network
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

networks:
  backtest_network:
    driver: bridge

# 使用方法：
# docker-compose up -d              # 后台启动
# docker-compose logs -f            # 查看日志
# docker-compose down               # 停止删除
# docker-compose stop               # 只停止不删除
# docker-compose restart            # 重启
# curl http://VPS_IP:8199/          # 查看扫描状态
# curl http://VPS_IP:8199/health    # 健康检查
