version: '3.8'

services:
  backtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-backtest
    
    # 环境变量
    environment:
      # API 配置
      SDT_KEY: ${SDT_KEY:-your_sdt_key}
      CSQAQ_TOKEN: ${CSQAQ_TOKEN:-your_csqaq_token}
      
      # 回测配置
      INITIAL_BALANCE: ${INITIAL_BALANCE:-10000}
      FEE_RATE: ${FEE_RATE:-0.025}
      MIN_PROFIT_RATE: ${MIN_PROFIT_RATE:-0.03}
      
      # Python 编码
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
    
    # 数据卷挂载
    volumes:
      # 输出结果映射到主机
      - ./output/backtest_results:/app/output/backtest_results
      - ./output/backtest_logs:/app/output/backtest_logs
      
      # 数据文件（可选，若想动态更新）
      - ./data:/app/data
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # 日志驱动
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    
    # 网络配置（可选）
    networks:
      - backtest_network

  # 可选：定时任务容器（使用 APScheduler）
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cs2-scheduler
    
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
      SDT_KEY: ${SDT_KEY:-your_sdt_key}
      CSQAQ_TOKEN: ${CSQAQ_TOKEN:-your_csqaq_token}
    
    volumes:
      - ./output/backtest_results:/app/output/backtest_results
      - ./output/backtest_logs:/app/output/backtest_logs
      - ./data:/app/data
    
    restart: unless-stopped
    
    entrypoint: python ./scripts/auto_backtest.py
    
    depends_on:
      - backtest
    
    networks:
      - backtest_network
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

networks:
  backtest_network:
    driver: bridge

# 使用方法：
# docker-compose up -d              # 后台启动
# docker-compose logs -f            # 查看日志
# docker-compose down               # 停止删除
# docker-compose stop               # 只停止不删除
# docker-compose restart            # 重启
